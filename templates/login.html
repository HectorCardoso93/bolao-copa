{% extends 'base.html' %}
{% block title %}Entrar — Bolão Copa 2026{% endblock %}
{% block content %}
<div style="max-width:420px;margin:40px auto">
  <div style="text-align:center;margin-bottom:28px">
    <div style="font-size:2.5rem">&#9917;</div>
    <h1 style="color:#f5c518;font-size:1.6rem;font-weight:800;margin-top:10px">Acessar Bolão</h1>
    <p style="color:#475569;font-size:.9rem;margin-top:6px">Entre com seu e-mail e senha cadastrados</p>
  </div>
  <div class="card">
    <form method="post">
      <div class="form-group">
        <label>E-mail</label>
        <input type="email" name="email" placeholder="seu@email.com" required autofocus maxlength="100">
      </div>
      <div class="form-group">
        <label>Senha <span style="color:#334155;font-weight:400;text-transform:none;font-size:.8rem">(4 dígitos)</span></label>
        <input type="password" name="pin" placeholder="••••" required maxlength="4" minlength="4"
               pattern="[0-9]{4}" inputmode="numeric"
               style="letter-spacing:6px;font-size:1.3rem;text-align:center">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:13px">
        Entrar &#8594;
      </button>
    </form>
    <div style="margin-top:18px;text-align:center;font-size:.85rem;color:#475569">
      Ainda não tem cadastro? <a href="{{ url_for('cadastro') }}">Criar conta</a>
    </div>
  </div>
</div>
{% endblock %}
