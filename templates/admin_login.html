{% extends 'base.html' %}
{% block title %}Admin — Bolão Copa 2026{% endblock %}
{% block content %}
<div style="max-width:380px;margin:60px auto">
  <div style="text-align:center;margin-bottom:24px">
    <div style="font-size:2rem">&#128274;</div>
    <h1 style="color:#f5c518;font-size:1.4rem;font-weight:800;margin-top:10px">Acesso Administrativo</h1>
  </div>
  <div class="card">
    <form method="post">
      <div class="form-group">
        <label>Senha</label>
        <input type="password" name="password" placeholder="Senha de administrador" required autofocus>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:13px">
        Entrar
      </button>
    </form>
  </div>
</div>
{% endblock %}
